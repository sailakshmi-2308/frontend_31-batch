<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" placeholder="enter student name" id="student">
    <button onclick="addStudent()">Add Student</button>
    <ul id="studentsList"></ul>

    <script>
        onload=function(){
            loadStudents()
        }
        function addStudent() {

            let student_field = document.getElementById("student").value
            if (student_field == "") {
                alert("please neter your name")
                return false
            }

            let existingStudents = getStudentsFromLocalStorage();
            console.log(existingStudents);

            existingStudents.push(student_field);
            console.log(existingStudents)

            localStorage.setItem("students", JSON.stringify(existingStudents));
            loadStudents()

        }

        function getStudentsFromLocalStorage() {
            let students = localStorage.getItem("students")
            return students ? JSON.parse(students):[]
        }

        function loadStudents() {
            let studentList = document.getElementById("studentsList");
            studentList.innerHTML=""
            let existingStudents = getStudentsFromLocalStorage();
            existingStudents.forEach(function (i,index) {
                console.log(i, index);
                let li = document.createElement("li");
                li.innerHTML = `${i} <button onclick="deleteStudents(${index})">Delete</button>`
                studentList.appendChild(li)
            })
        }

        function deleteStudents(index) {
          
            console.log(index);
            let existingStudents = getStudentsFromLocalStorage();
            existingStudents.splice(index,1);
            localStorage.setItem("students",JSON.stringify(existingStudents));
            loadStudents()



        }
    </script>
</body>

</html>
