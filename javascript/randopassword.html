<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        let password=[]
        let passwordList="abcdefghijklmnopqrstuvwxyz1234567890!@#%$%^&*()_+"
        let password_length=passwordList.length
        // console.log(password_length)

        for(let i=0;i<8;i++){
            let randomnumber= Math.floor(Math.random()*password_length)
            // console.log(randompassword);
            let randomcharacter= passwordList.charAt(randomnumber)
            console.log(randomcharacter);
            password.push(randomcharacter)

        }

        console.log(password);
        let random=password.join("")
        console.log(random)


    </script>
</body>
