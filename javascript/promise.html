<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let madhav = new Promise(function(resolve,reject){
            let success=false
            if(success){
                resolve("task completed")
            }else{
                reject("task failed")
            }

        })
        console.log(madhav)
        // console.log(typeOf(newPromise))

        madhav.then(function(result){
            console.log(result)
        })
        .catch(function(res){
console.log(res)
        })
    </script>
</body>
</html>
