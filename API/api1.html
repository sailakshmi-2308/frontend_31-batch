<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .card{
        border:2px solid black;
        padding:10px
    }
</style>
</head>

<body>

    <div id="doctors"></div>
    <script>
        function getDoctors() {
            fetch("https://doc-back.onrender.com/doctors", {
                method: "GET"
            })
                .then((result) => {
                    console.log(result);
                    return result.json()
                })
                .then((res) => {
                    console.log(res)
                    showDoctors(res);
                })

        }
        getDoctors()

        function showDoctors(data) {
            data.map((i) => {
                console.log(i.name);
                document.getElementById("doctors").innerHTML+=`
                

                <div class="card">
                    <p>${i.name}</p>
                    <p>${i.salary}</p>
                    <p>${i.gender}</p>
                    <p>${i.age}</p>
                    <p>${i.specialization}</p>
                    
                </div>
                
                `

            })

        }
    </script>
</body>

</html>
